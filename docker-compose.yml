version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: mina-nginx-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src:/var/www/html:ro
    ports:
      - "80:80"
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/booking", "|", "grep", "-q", "book-appointment-wizard"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 128m
    cpus: "0.5"

  app:
    build:
      context: ./src
      dockerfile: ../php/Dockerfile
    container_name: mina-app
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 9000) ? 0 : 1);'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    cpus: "1.5"

  mysql:
    image: mysql:8.0
    container_name: mina-mysql
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 1024m
    cpus: "1.0"

  redis:
    image: redis:alpine
    container_name: mina-redis
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: "0.3"

networks:
  internal:

volumes:
  mysql-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/mysql
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/redis
  app-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/storage
