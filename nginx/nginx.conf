worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;

    upstream app {
        server app:9000;
    }

    upstream adminer {
        server adminer:8080;
    }

    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.php index.html;

        # Adminer: DB web client restricted to allowlisted IPs + HTTP basic auth
        location ^~ /db-admin/ {
            # IP allowlist - update with your own IPs
            allow 181.42.20.15;       # owner public IP
            allow 127.0.0.1;          # localhost (VPS self-test)
            allow 172.16.0.0/12;      # Docker default bridge networks (for testing)
            deny all;

            # HTTP basic auth (file: /etc/nginx/dbadmin.htpasswd)
            auth_basic "Mina DB Admin";
            auth_basic_user_file /etc/nginx/dbadmin.htpasswd;

            # Proxy to adminer container
            proxy_pass http://adminer/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Block direct access to adminer's default path if anyone guesses it
        location = /adminer { return 404; }
        location = /adminer.php { return 404; }

        location ~ ^/assets/ {
            try_files $uri =404;
            access_log off;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            fastcgi_pass app;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;
        }

        location ~ /\. {
            deny all;
        }

        location /storage/ {
            internal;
            alias /var/www/html/storage/;
        }

        client_max_body_size 10M;
    }
}
