version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: mina-nginx-proxy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    restart: unless-stopped

 app:
    build:
      context: ./src
      dockerfile: ../php/Dockerfile
    container_name: mina-app
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL: ${JWT_TTL}
    networks:
      - internal
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mina-mysql
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: mina-redis
    volumes:
      - redis-data:/data
    networks:
      - internal
    restart: unless-stopped

  cron:
    build:
      context: ./src
      dockerfile: ../php/Dockerfile
    container_name: mina-cron
    command: cron -f
    volumes:
      - app-storage:/var/www/html/storage
    environment:
      APP_ENV: ${APP_ENV}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  mysql-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/mysql
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/redis
  app-storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/volume/storage
