[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
loglevel=info

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_max_bytes=0
stderr_logfile=/dev/stderr
stderr_logfile_max_bytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_max_bytes=0
stderr_logfile=/dev/stderr
stderr_logfile_max_bytes=0

[program:cron]
command=/usr/sbin/crond -f -l 8
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_max_bytes=0
stderr_logfile=/dev/stderr
stderr_logfile_max_bytes=0
